<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lingüine Mayorista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --acc:#c4552a;--bg:#f7f3ee;--dark:#1e1410;--text:#1a0e08;--muted:#6b4c35;--border:rgba(92,51,23,.12);--card:#fff;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"DM Sans",sans-serif;background:linear-gradient(180deg,#24150f 0%,#1e1410 100%);color:var(--text)}
    button,input,select,textarea{font:inherit}
    .hidden{display:none!important}
    .home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px}
    .brand{font-family:"Fraunces",serif;font-size:34px;color:#faf6ee}
    .tag{margin-top:8px;color:rgba(212,165,106,.55);text-transform:uppercase;letter-spacing:.18em;font-size:11px}
    .grid{width:min(980px,100%);display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:36px}
    .card{background:#251610;border:1px solid rgba(212,165,106,.08);border-radius:16px;padding:20px;color:#faf6ee;cursor:pointer;transition:.18s transform,.18s box-shadow;position:relative}
    .card:hover{transform:translateY(-4px);box-shadow:0 18px 50px rgba(0,0,0,.35)}
    .card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;border-radius:16px 16px 0 0;background:var(--rc)}
    .emoji{font-size:30px;display:block;margin-bottom:10px}
    .name{font-family:"Fraunces",serif;font-size:20px}
    .desc{margin-top:6px;color:rgba(212,165,106,.55);font-size:13px;line-height:1.5}
    .add-card{display:flex;align-items:center;justify-content:center;border:1.5px dashed rgba(212,165,106,.2);background:transparent;color:rgba(212,165,106,.6)}
    .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;background:var(--bg)}
    aside{background:var(--dark);color:#faf6ee;padding:18px 14px;border-right:1px solid rgba(255,255,255,.05)}
    .side-title{font-family:"Fraunces",serif;font-size:18px;margin-bottom:2px}
    .side-desc{font-size:12px;color:rgba(212,165,106,.5);margin-bottom:18px}
    .nav button,.ghost,.primary,.danger{border:none;border-radius:10px;cursor:pointer}
    .nav button{width:100%;text-align:left;background:none;color:rgba(250,246,238,.65);padding:10px 12px;margin-bottom:4px}
    .nav button.active,.nav button:hover{background:rgba(255,255,255,.08);color:#fff}
    .back{width:100%;margin-top:14px;background:rgba(255,255,255,.06);color:#fff;padding:10px 12px}
    main{padding:24px}
    .top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px}
    .title{font-family:"Fraunces",serif;font-size:28px}
    .subtitle{color:var(--muted);font-size:14px;margin-top:4px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:16px}
    .stat,.panel{background:var(--card);border:1px solid var(--border);border-radius:14px}
    .stat{padding:16px}
    .stat label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
    .stat strong{display:block;font-family:"Fraunces",serif;font-size:30px;margin-top:4px}
    .panels{display:grid;grid-template-columns:1.3fr .9fr;gap:14px}
    .panel{padding:16px}
    .panel h3{margin:0 0 12px;font-family:"Fraunces",serif;font-size:18px}
    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid rgba(92,51,23,.08);text-align:left;font-size:13px}
    th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    tr:last-child td{border-bottom:none}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap}
    .primary{background:var(--acc);color:#fff;padding:10px 14px}
    .ghost{background:transparent;border:1px solid rgba(92,51,23,.18);color:var(--muted);padding:10px 14px}
    .danger{background:#fdecec;color:#b02020;padding:8px 10px}
    .layout-two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
    .field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
    .field input,.field select,.field textarea{width:100%;padding:10px;border:1px solid rgba(92,51,23,.18);border-radius:10px;background:#faf6ee}
    .section{display:none}
    .section.active{display:block}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700}
    .ok{background:#e5f5ec;color:#2a7a45}
    .low{background:#fff3e0;color:#a06020}
    .out{background:#fdecec;color:#b02020}
    .row-actions{display:flex;gap:6px}
    .muted{color:var(--muted)}
    .empty{padding:28px;text-align:center;color:var(--muted)}
    .footer-note{margin-top:12px;font-size:12px;color:var(--muted)}
    @media (max-width: 920px){
      .app{grid-template-columns:1fr}
      .panels,.layout-two{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <section id="home" class="home"></section>
  <section id="app" class="app hidden">
    <aside>
      <div class="side-title" id="sideRestaurant"></div>
      <div class="side-desc" id="sideDescription"></div>
      <div class="nav" id="nav"></div>
      <button class="back" id="backBtn">← Volver al inicio</button>
    </aside>
    <main>
      <div class="top">
        <div>
          <div class="title" id="sectionTitle"></div>
          <div class="subtitle" id="sectionSubtitle"></div>
        </div>
        <div class="toolbar" id="sectionToolbar"></div>
      </div>
      <div id="content"></div>
    </main>
  </section>

  <script>
    const DEFAULT_RESTS = [
      { id: "ra", nombre: "Restaurante Azul", emoji: "🍝", color: "#1E5F9E", desc: "Pasta fresca artesanal" },
      { id: "rb", nombre: "Restaurante Rojo", emoji: "🫕", color: "#C4552A", desc: "Producción diaria" },
      { id: "rc", nombre: "Restaurante Verde", emoji: "🌿", color: "#2E7D52", desc: "Cocina de autor" },
    ];
    const NAV = [
      ["dash","Dashboard"],["ings","Materias primas"],["recs","Recetas"],["ingresos","Ingreso MP"],["prod","Producción"],["ent","Entregas"],["stock","Stock"],["info","Informes"]
    ];
    const state = { activeRestId: null, section: "dash" };

    const $ = (s) => document.querySelector(s);
    const fmt = (n) => Number(n || 0).toLocaleString("es-AR", { maximumFractionDigits: 2 });
    const fmtDate = (ts) => ts ? new Date(ts).toLocaleDateString("es-AR") : "—";
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    const today = () => new Date().toISOString().slice(0, 10);
    const ts = (v) => new Date(v).getTime();

    const load = (k, fb) => JSON.parse(localStorage.getItem(k) || JSON.stringify(fb));
    const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
    const key = (suffix) => `lm4:${state.activeRestId}:${suffix}`;
    const restaurants = () => load("lm4:restaurants", DEFAULT_RESTS);
    const setRestaurants = (list) => save("lm4:restaurants", list);
    const activeRest = () => restaurants().find(r => r.id === state.activeRestId);
    const list = (name) => load(key(name), []);
    const setList = (name, values) => save(key(name), values);

    function stockMP() {
      const ings = list("ing");
      const ingresos = list("imp");
      const prod = list("prod");
      const recs = list("rec");
      const map = Object.fromEntries(ings.map(i => [i.id, 0]));
      ingresos.forEach(x => map[x.ingId] = (map[x.ingId] || 0) + Number(x.cantidad || 0));
      prod.forEach(p => {
        const rec = recs.find(r => r.id === p.recId);
        (rec?.ings || []).forEach(ri => {
          map[ri.ingId] = (map[ri.ingId] || 0) - Number(ri.cant || 0) * Number(p.lotes || 0);
        });
      });
      return map;
    }

    function stockProd() {
      const recs = list("rec");
      const prod = list("prod");
      const ent = list("ent");
      const map = Object.fromEntries(recs.map(r => [r.id, { por: 0, kg: 0 }]));
      prod.forEach(p => {
        if (!map[p.recId]) map[p.recId] = { por: 0, kg: 0 };
        map[p.recId].por += Number(p.por || 0);
        map[p.recId].kg += Number(p.kg || 0);
      });
      ent.forEach(e => {
        if (!map[e.recId]) map[e.recId] = { por: 0, kg: 0 };
        if (e.tipo === "por") map[e.recId].por -= Number(e.cant || 0);
        else map[e.recId].kg -= Number(e.cant || 0);
      });
      return map;
    }

    function renderHome() {
      const home = $("#home");
      const rests = restaurants();
      home.innerHTML = `
        <div class="brand">Lingüine Mayorista</div>
        <div class="tag">Sistema Web de Producción</div>
        <div class="grid">
          ${rests.map(r => `
            <article class="card" style="--rc:${r.color}" data-open="${r.id}">
              <span class="emoji">${r.emoji}</span>
              <div class="name">${r.nombre}</div>
              <div class="desc">${r.desc || ""}</div>
            </article>
          `).join("")}
          <button class="card add-card" id="newRestaurant">＋ Agregar restaurante</button>
        </div>
      `;
      home.querySelectorAll("[data-open]").forEach(el => el.onclick = () => {
        state.activeRestId = el.dataset.open;
        $("#home").classList.add("hidden");
        $("#app").classList.remove("hidden");
        renderApp();
      });
      $("#newRestaurant").onclick = () => {
        const nombre = prompt("Nombre del restaurante");
        if (!nombre) return;
        const emoji = prompt("Emoji", "🍝") || "🍝";
        const desc = prompt("Descripción", "Nueva sucursal") || "";
        const color = prompt("Color HEX", "#C4552A") || "#C4552A";
        setRestaurants([...rests, { id: uid(), nombre, emoji, desc, color }]);
        renderHome();
      };
    }

    function renderApp() {
      const rest = activeRest();
      if (!rest) return;
      document.documentElement.style.setProperty("--acc", rest.color);
      $("#sideRestaurant").textContent = `${rest.emoji} ${rest.nombre}`;
      $("#sideDescription").textContent = rest.desc || "Gestión de operaciones";
      $("#nav").innerHTML = NAV.map(([id, label]) => `<button class="${state.section === id ? "active" : ""}" data-sec="${id}">${label}</button>`).join("");
      $("#nav").querySelectorAll("button").forEach(btn => btn.onclick = () => { state.section = btn.dataset.sec; renderApp(); });
      $("#backBtn").onclick = () => { $("#app").classList.add("hidden"); $("#home").classList.remove("hidden"); };
      renderSection();
    }

    function renderSection() {
      const titles = {
        dash:["Dashboard","Resumen general del restaurante"],
        ings:["Materias primas","Ingredientes, unidad, mínimo y precio"],
        recs:["Recetas","Platos y consumo por lote"],
        ingresos:["Ingreso de materias primas","Compras y abastecimiento"],
        prod:["Producción","Registro de lotes y porciones"],
        ent:["Entregas","Salidas por porciones o peso"],
        stock:["Stock","Estado actual de materias primas y producto terminado"],
        info:["Informes","Resumen exportable del período actual"]
      };
      $("#sectionTitle").textContent = titles[state.section][0];
      $("#sectionSubtitle").textContent = titles[state.section][1];
      $("#sectionToolbar").innerHTML = "";
      const renderers = { dash: renderDash, ings: renderIngs, recs: renderRecs, ingresos: renderIngresos, prod: renderProd, ent: renderEnt, stock: renderStock, info: renderInfo };
      $("#content").innerHTML = renderers[state.section]();
      bindSectionEvents();
    }

    function renderDash() {
      const ings = list("ing"), recs = list("rec"), ingresos = list("imp"), prod = list("prod"), ent = list("ent");
      const smp = stockMP(), spr = stockProd();
      const low = ings.filter(i => (smp[i.id] || 0) > 0 && Number(i.min || 0) > 0 && (smp[i.id] || 0) < Number(i.min)).length;
      const out = ings.filter(i => (smp[i.id] || 0) <= 0).length;
      return `
        <div class="stats">
          <div class="stat"><label>Materias primas</label><strong>${ings.length}</strong></div>
          <div class="stat"><label>Recetas</label><strong>${recs.length}</strong></div>
          <div class="stat"><label>Producciones</label><strong>${prod.length}</strong></div>
          <div class="stat"><label>Entregas</label><strong>${ent.length}</strong></div>
        </div>
        <div class="stats">
          <div class="stat"><label>Stock bajo</label><strong>${low}</strong></div>
          <div class="stat"><label>Sin stock</label><strong>${out}</strong></div>
          <div class="stat"><label>Ingresos MP</label><strong>${ingresos.length}</strong></div>
          <div class="stat"><label>Productos con stock</label><strong>${Object.values(spr).filter(s => s.por > 0 || s.kg > 0).length}</strong></div>
        </div>
        <div class="panels">
          <div class="panel">
            <h3>Últimas producciones</h3>
            ${table([
              ["Fecha","Plato","Lotes","Porciones","Kg"],
              ...prod.sort((a,b) => b.fecha - a.fecha).slice(0,8).map(p => {
                const rec = recs.find(r => r.id === p.recId);
                return [fmtDate(p.fecha), rec?.nombre || "—", p.lotes, fmt(p.por), fmt(p.kg)];
              })
            ])}
          </div>
          <div class="panel">
            <h3>Stock de materias primas</h3>
            ${table([
              ["Ingrediente","Stock","Estado"],
              ...ings.map(i => {
                const s = smp[i.id] || 0;
                const min = Number(i.min || 0);
                const badge = s <= 0 ? badgeHtml("SIN STOCK","out") : min > 0 && s < min ? badgeHtml("BAJO","low") : badgeHtml("OK","ok");
                return [i.nombre, `${fmt(s)} ${i.unidad}`, badge];
              })
            ])}
          </div>
        </div>
      `;
    }

    function renderIngs() {
      const ings = list("ing");
      const smp = stockMP();
      return `
        <div class="panel">
          <div class="toolbar" style="margin-bottom:12px">
            <button class="primary" id="addIng">+ Nuevo ingrediente</button>
          </div>
          ${table([
            ["Ingrediente","Unidad","Precio","Stock","Mínimo","Estado","Acciones"],
            ...ings.map(i => {
              const s = smp[i.id] || 0;
              const min = Number(i.min || 0);
              const status = s <= 0 ? badgeHtml("SIN STOCK","out") : min > 0 && s < min ? badgeHtml("BAJO","low") : badgeHtml("OK","ok");
              return [i.nombre, i.unidad, i.precio ? `$${fmt(i.precio)}` : "—", fmt(s), i.min || "—", status, actionButtons("ing", i.id)];
            })
          ])}
        </div>
      `;
    }

    function renderRecs() {
      const recs = list("rec");
      const ings = list("ing");
      return `
        <div class="panel">
          <div class="toolbar" style="margin-bottom:12px">
            <button class="primary" id="addRec">+ Nueva receta</button>
          </div>
          ${table([
            ["Plato","g/porción","Ingredientes","Acciones"],
            ...recs.map(r => [r.nombre, r.gpor || "—", (r.ings || []).map(ri => {
              const ing = ings.find(i => i.id === ri.ingId);
              return `${ing?.nombre || "—"} (${ri.cant} ${ing?.unidad || ""})`;
            }).join(", "), actionButtons("rec", r.id)])
          ])}
        </div>
      `;
    }

    function renderIngresos() {
      const ingresos = list("imp"), ings = list("ing");
      return `
        <div class="layout-two">
          <div class="panel">
            <h3>Registrar ingreso</h3>
            <form id="formIngreso" class="form-grid">
              <div class="field"><label>Ingrediente</label><select name="ingId">${ings.map(i => `<option value="${i.id}">${i.nombre}</option>`).join("")}</select></div>
              <div class="field"><label>Cantidad</label><input name="cantidad" type="number" step="any" required></div>
              <div class="field"><label>Costo</label><input name="costo" type="number" step="any"></div>
              <div class="field"><label>Proveedor</label><input name="prov"></div>
              <div class="field"><label>Fecha</label><input name="fecha" type="date" value="${today()}"></div>
              <div class="field"><label>Nota</label><input name="nota"></div>
              <div class="field"><button class="primary" type="submit">Guardar ingreso</button></div>
            </form>
          </div>
          <div class="panel">
            <h3>Historial</h3>
            ${table([
              ["Fecha","Ingrediente","Cantidad","Costo","Proveedor"],
              ...ingresos.sort((a,b) => b.fecha - a.fecha).map(x => {
                const ing = ings.find(i => i.id === x.ingId);
                return [fmtDate(x.fecha), ing?.nombre || "—", `${fmt(x.cantidad)} ${ing?.unidad || ""}`, x.costo ? `$${fmt(x.costo)}` : "—", x.prov || "—"];
              })
            ])}
          </div>
        </div>
      `;
    }

    function renderProd() {
      const recs = list("rec"), prod = list("prod"), smp = stockMP();
      return `
        <div class="layout-two">
          <div class="panel">
            <h3>Registrar producción</h3>
            <form id="formProd" class="form-grid">
              <div class="field"><label>Receta</label><select name="recId">${recs.map(r => `<option value="${r.id}">${r.nombre}</option>`).join("")}</select></div>
              <div class="field"><label>Lotes</label><input name="lotes" type="number" step="1" required></div>
              <div class="field"><label>Peso kg</label><input name="kg" type="number" step="any"></div>
              <div class="field"><label>Porciones</label><input name="por" type="number" step="1"></div>
              <div class="field"><label>Tiempo real (min)</label><input name="treal" type="number"></div>
              <div class="field"><label>Fecha</label><input name="fecha" type="date" value="${today()}"></div>
              <div class="field" style="grid-column:1/-1"><label>Nota</label><input name="nota"></div>
              <div class="field"><button class="primary" type="submit">Guardar producción</button></div>
            </form>
            <div class="footer-note">La producción descuenta automáticamente materias primas según la receta.</div>
          </div>
          <div class="panel">
            <h3>Historial</h3>
            ${table([
              ["Fecha","Plato","Lotes","Porciones","Kg"],
              ...prod.sort((a,b) => b.fecha - a.fecha).map(p => {
                const rec = recs.find(r => r.id === p.recId);
                return [fmtDate(p.fecha), rec?.nombre || "—", p.lotes, fmt(p.por), fmt(p.kg)];
              })
            ])}
          </div>
        </div>
      `;
    }

    function renderEnt() {
      const recs = list("rec"), ent = list("ent");
      return `
        <div class="layout-two">
          <div class="panel">
            <h3>Registrar entrega</h3>
            <form id="formEnt" class="form-grid">
              <div class="field"><label>Receta</label><select name="recId">${recs.map(r => `<option value="${r.id}">${r.nombre}</option>`).join("")}</select></div>
              <div class="field"><label>Tipo</label><select name="tipo"><option value="por">Porciones</option><option value="kg">Peso (kg)</option></select></div>
              <div class="field"><label>Cantidad</label><input name="cant" type="number" step="any" required></div>
              <div class="field"><label>Destinatario</label><input name="dest"></div>
              <div class="field"><label>Fecha</label><input name="fecha" type="date" value="${today()}"></div>
              <div class="field"><label>Nota</label><input name="nota"></div>
              <div class="field"><button class="primary" type="submit">Guardar entrega</button></div>
            </form>
          </div>
          <div class="panel">
            <h3>Historial</h3>
            ${table([
              ["Fecha","Plato","Tipo","Cantidad","Destino"],
              ...ent.sort((a,b) => b.fecha - a.fecha).map(e => {
                const rec = recs.find(r => r.id === e.recId);
                return [fmtDate(e.fecha), rec?.nombre || "—", e.tipo === "por" ? "Porciones" : "Kg", fmt(e.cant), e.dest || "—"];
              })
            ])}
          </div>
        </div>
      `;
    }

    function renderStock() {
      const ings = list("ing"), recs = list("rec"), smp = stockMP(), spr = stockProd();
      return `
        <div class="layout-two">
          <div class="panel">
            <h3>Materias primas</h3>
            ${table([
              ["Ingrediente","Stock","Mínimo","Estado"],
              ...ings.map(i => {
                const s = smp[i.id] || 0;
                const min = Number(i.min || 0);
                const status = s <= 0 ? badgeHtml("SIN STOCK","out") : min > 0 && s < min ? badgeHtml("BAJO","low") : badgeHtml("OK","ok");
                return [i.nombre, `${fmt(s)} ${i.unidad}`, i.min || "—", status];
              })
            ])}
          </div>
          <div class="panel">
            <h3>Productos terminados</h3>
            ${table([
              ["Plato","Porciones","Kg"],
              ...recs.map(r => {
                const s = spr[r.id] || { por: 0, kg: 0 };
                return [r.nombre, fmt(s.por), fmt(s.kg)];
              })
            ])}
          </div>
        </div>
      `;
    }

    function renderInfo() {
      const ingresos = list("imp"), prod = list("prod"), ent = list("ent");
      const costoMP = ingresos.reduce((a, x) => a + Number(x.costo || 0), 0);
      const por = prod.reduce((a, x) => a + Number(x.por || 0), 0);
      const kg = prod.reduce((a, x) => a + Number(x.kg || 0), 0);
      return `
        <div class="stats">
          <div class="stat"><label>Costo total MP</label><strong>$${fmt(costoMP)}</strong></div>
          <div class="stat"><label>Porciones producidas</label><strong>${fmt(por)}</strong></div>
          <div class="stat"><label>Kg producidos</label><strong>${fmt(kg)}</strong></div>
          <div class="stat"><label>Entregas</label><strong>${ent.length}</strong></div>
        </div>
        <div class="panel">
          <h3>Resumen</h3>
          <p class="muted">Materias primas: ${list("ing").length} | Recetas: ${list("rec").length} | Ingresos: ${ingresos.length} | Producciones: ${prod.length} | Entregas: ${ent.length}</p>
          <button class="primary" id="copySummary">Copiar informe</button>
        </div>
      `;
    }

    function table(rows) {
      if (rows.length <= 1) return `<div class="empty">Sin registros todavía</div>`;
      const [head, ...body] = rows;
      return `
        <div class="table-wrap">
          <table>
            <thead><tr>${head.map(h => `<th>${h}</th>`).join("")}</tr></thead>
            <tbody>${body.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>
          </table>
        </div>
      `;
    }

    function badgeHtml(text, cls) {
      return `<span class="badge ${cls}">${text}</span>`;
    }

    function actionButtons(type, id) {
      return `<div class="row-actions"><button class="ghost" data-edit="${type}:${id}">Editar</button><button class="danger" data-del="${type}:${id}">Borrar</button></div>`;
    }

    function bindSectionEvents() {
      if ($("#addIng")) $("#addIng").onclick = addIngredient;
      if ($("#addRec")) $("#addRec").onclick = addRecipe;
      if ($("#formIngreso")) $("#formIngreso").onsubmit = saveIngreso;
      if ($("#formProd")) $("#formProd").onsubmit = saveProd;
      if ($("#formEnt")) $("#formEnt").onsubmit = saveEnt;
      if ($("#copySummary")) $("#copySummary").onclick = copySummary;
      document.querySelectorAll("[data-del]").forEach(btn => btn.onclick = handleDelete);
      document.querySelectorAll("[data-edit]").forEach(btn => btn.onclick = handleEdit);
    }

    function addIngredient() {
      const nombre = prompt("Nombre del ingrediente");
      if (!nombre) return;
      const unidad = prompt("Unidad", "kg") || "kg";
      const min = prompt("Stock mínimo", "0") || "0";
      const precio = prompt("Precio por unidad", "0") || "0";
      setList("ing", [...list("ing"), { id: uid(), nombre, unidad, min, precio }]);
      renderSection();
    }

    function addRecipe() {
      const ings = list("ing");
      if (!ings.length) return alert("Primero cargá materias primas.");
      const nombre = prompt("Nombre de la receta");
      if (!nombre) return;
      const gpor = prompt("Gramos por porción", "200") || "";
      const raw = prompt("Ingredientes por lote. Formato: nombre:cantidad, nombre:cantidad", `${ings[0].nombre}:1`) || "";
      const items = raw.split(",").map(x => x.trim()).filter(Boolean).map(pair => {
        const [nombreIng, cant] = pair.split(":").map(x => x.trim());
        const ing = ings.find(i => i.nombre.toLowerCase() === nombreIng.toLowerCase());
        return ing ? { ingId: ing.id, cant } : null;
      }).filter(Boolean);
      setList("rec", [...list("rec"), { id: uid(), nombre, gpor, ings: items }]);
      renderSection();
    }

    function saveIngreso(e) {
      e.preventDefault();
      const f = new FormData(e.target);
      setList("imp", [...list("imp"), {
        id: uid(), ingId: f.get("ingId"), cantidad: f.get("cantidad"), costo: f.get("costo"), prov: f.get("prov"), nota: f.get("nota"), fecha: ts(f.get("fecha"))
      }]);
      e.target.reset(); e.target.fecha.value = today(); renderSection();
    }

    function saveProd(e) {
      e.preventDefault();
      const f = new FormData(e.target);
      const rec = list("rec").find(r => r.id === f.get("recId"));
      const lots = Number(f.get("lotes") || 0);
      const needed = (rec?.ings || []).every(ri => (stockMP()[ri.ingId] || 0) >= Number(ri.cant || 0) * lots);
      if (!needed) return alert("No hay stock suficiente de materias primas para esta producción.");
      let por = Number(f.get("por") || 0);
      const kg = Number(f.get("kg") || 0);
      if (!por && rec?.gpor && kg) por = Math.floor((kg * 1000) / Number(rec.gpor));
      setList("prod", [...list("prod"), {
        id: uid(), recId: f.get("recId"), lotes: lots, kg, por, treal: f.get("treal"), nota: f.get("nota"), fecha: ts(f.get("fecha"))
      }]);
      e.target.reset(); e.target.fecha.value = today(); renderSection();
    }

    function saveEnt(e) {
      e.preventDefault();
      const f = new FormData(e.target);
      const stock = stockProd()[f.get("recId")] || { por: 0, kg: 0 };
      const cantidad = Number(f.get("cant") || 0);
      const disponible = f.get("tipo") === "por" ? stock.por : stock.kg;
      if (cantidad > disponible) return alert("No hay stock suficiente de producto terminado.");
      setList("ent", [...list("ent"), {
        id: uid(), recId: f.get("recId"), tipo: f.get("tipo"), cant: cantidad, dest: f.get("dest"), nota: f.get("nota"), fecha: ts(f.get("fecha"))
      }]);
      e.target.reset(); e.target.fecha.value = today(); renderSection();
    }

    function handleDelete(e) {
      const [type, id] = e.target.dataset.del.split(":");
      if (!confirm("¿Eliminar este registro?")) return;
      const map = { ing: "ing", rec: "rec" };
      setList(map[type], list(map[type]).filter(x => x.id !== id));
      renderSection();
    }

    function handleEdit(e) {
      const [type, id] = e.target.dataset.edit.split(":");
      const map = { ing: "ing", rec: "rec" };
      const items = list(map[type]);
      const item = items.find(x => x.id === id);
      if (!item) return;
      if (type === "ing") {
        const nombre = prompt("Nombre", item.nombre); if (!nombre) return;
        const unidad = prompt("Unidad", item.unidad) || item.unidad;
        const min = prompt("Mínimo", item.min || "0") || item.min;
        const precio = prompt("Precio", item.precio || "0") || item.precio;
        setList("ing", items.map(x => x.id === id ? { ...x, nombre, unidad, min, precio } : x));
      }
      if (type === "rec") {
        const nombre = prompt("Nombre", item.nombre); if (!nombre) return;
        const gpor = prompt("Gramos por porción", item.gpor || "") || item.gpor;
        setList("rec", items.map(x => x.id === id ? { ...x, nombre, gpor } : x));
      }
      renderSection();
    }

    function copySummary() {
      const resumen = [
        `Informe de ${activeRest().nombre}`,
        `Materias primas: ${list("ing").length}`,
        `Recetas: ${list("rec").length}`,
        `Ingresos MP: ${list("imp").length}`,
        `Producciones: ${list("prod").length}`,
        `Entregas: ${list("ent").length}`,
      ].join("\n");
      navigator.clipboard.writeText(resumen).then(() => alert("Informe copiado."));
    }

    renderHome();
  </script>
</body>
</html>
