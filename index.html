<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lingüine Mayorista</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1E1410">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; background: #1E1410; color: #FAF6EE; font-family: sans-serif; }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        .card { background: #251610; padding: 20px; border-radius: 12px; border: 1px solid rgba(212,165,106,0.1); margin: 10px; cursor: pointer; }
        h1 { font-size: 24px; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh;">
            <p>Cargando panel de producción...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [active, setActive] = useState(null);
            
            // Datos básicos para probar la visibilidad
            const clientes = [
                { id: 1, nombre: "Casa Belucci", emoji: "🍝" },
                { id: 2, nombre: "Mondongo y Coliflor", emoji: "🍲" },
                { id: 3, nombre: "Casa Planes", emoji: "🍷" }
            ];

            if (active) {
                return (
                    <div style={{padding: '20px'}}>
                        <button onClick={() => setActive(null)} style={{background: 'none', color: '#C4552A', border: '1px solid #C4552A', padding: '10px', borderRadius: '8px'}}>← Volver</button>
                        <h2 style={{marginTop: '20px'}}>Panel de {active.nombre}</h2>
                        <p>Aquí gestionaremos la materia prima y las entregas.</p>
                    </div>
                );
            }

            return (
                <div style={{padding: '20px'}}>
                    <h1>Lingüine Mayorista</h1>
                    <p style={{textAlign: 'center', opacity: 0.6}}>Seleccioná un cliente para operar</p>
                    <div style={{marginTop: '30px'}}>
                        {clientes.map(c => (
                            <div key={c.id} className="card" onClick={() => setActive(c)}>
                                <span style={{fontSize: '24px'}}>{c.emoji}</span>
                                <span style={{marginLeft: '15px', fontSize: '18px'}}>{c.nombre}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
